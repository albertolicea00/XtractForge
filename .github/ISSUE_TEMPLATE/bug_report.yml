name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much as you can — the more detail, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: XtractForge version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 15.1, Windows 11, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: plugin
    attributes:
      label: Which plugin is affected?
      options:
        - yt-dlp
        - Lux
        - gallery-dl
        - spotDL
        - External / community plugin
        - Not plugin-specific (app-level)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Paste URL: ...
        3. Click Analyze
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error message or logs
      description: Paste any error messages, console output, or stack traces.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, related issues, etc.
