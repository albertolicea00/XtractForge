name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it clearly and we'll discuss it here.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New plugin / tool support
        - Download queue
        - AI Discover (Ollama)
        - Plugin management
        - Settings / configuration
        - UI / UX
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other approaches or workarounds you've tried.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, related issues, etc.
