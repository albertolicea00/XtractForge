name: Plugin Submission
description: Submit a community plugin to be listed in ADDONS.md
labels: ["plugin"]
body:
  - type: markdown
    attributes:
      value: |
        Share your plugin with the XtractForge community. Once reviewed it will be added to [ADDONS.md](../ADDONS.md).

  - type: input
    id: name
    attributes:
      label: Plugin name
      placeholder: "e.g. my-downloader"
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: Plugin repository or file URL
      placeholder: "https://github.com/you/xtractforge-my-plugin"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Plugin type
      options:
        - Downloader
        - Searcher / AI
    validations:
      required: true

  - type: textarea
    id: sites
    attributes:
      label: Supported sites / services
      placeholder: "example.com, another-site.net"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What does it do?
      description: Brief description shown in the UI.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Plugin exports all required fields (`id`, `name`, `type`, `icon`, `repoUrl`, `installHint`, `configSchema`)
          required: true
        - label: Plugin exports required methods (`checkDependency`, `canHandle`, `getInfo`, `buildDownloadArgs`, `parseProgress`)
          required: true
        - label: I've tested this plugin with `pnpm dev` and it works
          required: true
        - label: The plugin does not bundle or distribute third-party binaries without appropriate licensing
          required: true
